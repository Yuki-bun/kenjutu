[package]
name = "kenjutu-nvim"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "kjn"
path = "src/main.rs"

[dependencies]
kenjutu-core = { path = "../crates/kenjutu-core" }
kenjutu-types = { path = "../crates/kenjutu-types", features = ["serde"] }
marker-commit = { path = "../crates/marker-commit" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
git2 = "0"
anyhow = "1"
